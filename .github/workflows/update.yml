name: Daily OSINT Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install AI & OSINT Libraries
        run: |
          pip install feedparser beautifulsoup4 textblob spacy scikit-learn
          python -m spacy download en_core_web_sm
          python -c "import nltk; nltk.download('punkt'); nltk.download('brown')"

      - name: Run Deep Scraper & Update Data
        run: python advanced_hormuz_scraper.py

      - name: Save and Push New Data
        run: |
          git config --global user.name 'AI-OSINT-Bot'
          git config --global user.email 'actions@github.com'
          git add hormuz_data.js hormuz_articles.csv
          git commit -m "Auto-Update: Daily Intelligence Briefing" || exit 0
          git push
